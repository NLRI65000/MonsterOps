name: CI

on:
  push:
    branches: [main, develop]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: mypy monsterops --ignore-missing-imports

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: radius
          POSTGRES_PASSWORD: radius
          POSTGRES_DB: radius
        options: >-
          --health-cmd "pg_isready -U radius"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      MONSTEROPS_DATABASE_URL: postgresql+asyncpg://radius:radius@localhost:5432/radius
      MONSTEROPS_SECRET_KEY: ci-test-secret-key-32bytes-long!!
      MONSTEROPS_DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Create radius_test database
        run: psql postgresql://radius:radius@localhost:5432/radius -c "CREATE DATABASE radius_test;"
      - run: python -m alembic upgrade head
      - run: pytest tests/ --ignore=tests/e2e --ignore=tests/security -v --tb=short

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: radius
          POSTGRES_PASSWORD: radius
          POSTGRES_DB: radius
        options: >-
          --health-cmd "pg_isready -U radius"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      MONSTEROPS_DATABASE_URL: postgresql+asyncpg://radius:radius@localhost:5432/radius
      MONSTEROPS_SECRET_KEY: ci-test-secret-key-32bytes-long!!
      # DEBUG keeps the session cookies non-Secure so the browser replays them
      # over plain http://localhost — the e2e conftest injects them to auth.
      MONSTEROPS_DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium
      - name: Run database migrations
        run: python -m alembic upgrade head
      - name: Launch app, seed admin, run e2e
        run: |
          python -m uvicorn monsterops.app:app --host 127.0.0.1 --port 8000 \
            --log-level warning > app.log 2>&1 &
          echo "Waiting for the app to accept connections…"
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/api/auth/status > /dev/null; then
              echo "app up after ${i}s"; break
            fi
            sleep 1
          done
          # Seed the first superadmin the e2e suite logs in as (fresh DB → first-run).
          curl -sf -X POST http://127.0.0.1:8000/api/auth/setup \
            -H 'Content-Type: application/json' \
            -d '{"username":"testadmin","password":"Test1234!","email":"testadmin@example.com"}' \
            || { echo "::error::admin seed failed — app never came up"; exit 1; }
          echo ""
          # -o addopts='' drops the default "-m not e2e" filter from pyproject.
          pytest tests/e2e -m e2e -o addopts='' -v --tb=short
      - name: App log (on failure)
        if: failure()
        run: cat app.log || true

  # ── Docker ─────────────────────────────────────────────────────────────────
  # Branch pushes: plain `docker build .` — verifies the Dockerfile is valid,
  #   no registry login needed, no buildx complications.
  # Version tags (v*.*.*): full buildx build + push to ghcr.io.
  docker-verify:
    name: Docker build (verify)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build .

  docker-publish:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
